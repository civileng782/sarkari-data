env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
name: Update Job Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies (safe step)
        run: |
          python -m pip install --upgrade pip

      - name: Run scraper
        run: |
          ls -la
          python scraper.py

      -       - name: Commit and push safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # Fetch full history (fix shallow clone issues)
          git fetch origin main

          # Reset to latest remote (strong fix)
          git reset --hard origin/main

          # Add new changes
          git add jobs.json

          # Commit only if changes exist
          git diff --cached --quiet || git commit -m "Auto update jobs data"

          # Push
          git push origin main
