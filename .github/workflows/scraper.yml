name: Update Job Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Ensure playwright is installed even if not in requirements.txt
          pip install requests beautifulsoup4 lxml playwright
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Install Playwright Browsers & Deps
        run: |
          # These two lines are required for the hybrid scraper to work on Linux
          python -m playwright install chromium
          python -m playwright install-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          
          # Only commit if there are changes
          if ! git diff --cached --quiet; then
            git commit -m "Auto update jobs data: $(date -u)"
            # Use rebase to handle cases where multiple runs might overlap
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected in jobs.json. Skipping push."
          fi
