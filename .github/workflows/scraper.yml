name: Run Job Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Debug environment
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF"
          date
          python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium

      - name: Network debug
        run: |
          echo "Public IP:"
          curl -s https://api.ipify.org || true
          echo ""
          echo "Geo:"
          curl -s https://ipinfo.io || true
          echo ""

      - name: Proxy debug test
        run: |
          echo "Testing direct IP:"
          curl -s http://httpbin.org/ip || true
          echo ""

      - name: Run scraper (with retry)
        run: |
          timeout 10m python scraper.py || (
            echo "Retrying once..."
            sleep 10
            python scraper.py
          )

      - name: Upload jobs.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-output
          path: jobs.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git pull --rebase origin main || true

          git add jobs.json
          git commit -m "Auto update jobs data" || echo "No changes"

          git push
