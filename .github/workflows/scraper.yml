name: Run Job Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      # ─── Checkout ────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─── Python setup ───────────────────────────────
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ─── Debug environment ──────────────────────────
      - name: Debug environment
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Branch: $GITHUB_REF"
          date
          python --version

      # ─── Install dependencies ───────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ─── Playwright install ─────────────────────────
      - name: Install Playwright browser
        run: |
          playwright install chromium --with-deps

      # ─── Network debug ──────────────────────────────
      - name: Network debug
        run: |
          echo "Public IP:"
          curl -s https://api.ipify.org || true
          echo ""
          echo "Geo:"
          curl -s https://ipinfo.io || true
          echo ""

      # ─── Direct IP test ─────────────────────────────
      - name: Proxy debug test
        run: |
          echo "Testing direct IP:"
          curl -s http://httpbin.org/ip || true
          echo ""

      # ─── Run scraper (UNBUFFERED + timeout + retry) ─
      - name: Run scraper (with retry)
        run: |
          timeout 10m python -u scraper.py || (
            echo "Retrying once..."
            sleep 10
            timeout 10m python -u scraper.py
          )

      # ─── Upload output ──────────────────────────────
      - name: Upload jobs.json
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jobs-output
          path: jobs.json

      # ─── SAFE Git commit (FIXED) ────────────────────
      - name: Commit and push (safe)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          # stage changes first
          git add jobs.json

          # commit if changes exist
          git commit -m "Auto update jobs data" || echo "No changes"

          # force sync with remote (prevents rebase conflict)
          git fetch origin
          git reset --hard origin/main

          # push safely
          git push origin main
