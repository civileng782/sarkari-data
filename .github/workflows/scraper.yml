name: Run Job Scraper

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore proxy cache
        uses: actions/cache@v3
        with:
          path: proxy_cache.json
          key: proxy-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            proxy-cache-${{ runner.os }}-

      - name: Debug environment
        run: |
          echo "Commit SHA : $GITHUB_SHA"
          echo "Branch     : $GITHUB_REF"
          date
          python --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browser
        run: |
          playwright install chromium

      - name: Network debug
        run: |
          echo "=== Public IP ==="
          curl -s https://api.ipify.org || true
          echo ""
          echo "=== Geo ==="
          curl -s https://ipinfo.io || true
          echo ""
          echo "=== ip-api.com reachability ==="
          curl -s "http://ip-api.com/json?fields=countryCode" || true
          echo ""

      - name: Run scraper
        run: |
          timeout 20m python -u scraper.py || (
            echo "First attempt failed — retrying once after 15s..."
            sleep 15
            timeout 20m python -u scraper.py
          )

      # ✅ FIXED STEP (properly inside steps + correct indentation)
      - name: Commit and push
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"

          git checkout main

          git add jobs.json
          [ -f proxy_cache.json ] && git add proxy_cache.json || true

          git diff --staged --quiet \
            && echo "No changes to commit — skipping." \
            || git commit -m "chore: auto-update jobs data [skip ci]"

          git pull --rebase origin main || echo "Rebase skipped"

          git push origin main
