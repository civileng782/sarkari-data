name: Update Job Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync with remote
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt        # Fix 2: single install from requirements.txt only

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium   # Fix 1+3: sudo-safe, atomic

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto update jobs data: $(date -u)"
            git pull --rebase origin main
            git push origin main
          else
            echo "No changes detected in jobs.json. Skipping push."
          fi
