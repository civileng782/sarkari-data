name: Update Job Data

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ✅ FIX push error

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4   # ✅ updated version

      - name: Setup Python
        uses: actions/setup-python@v5   # ✅ updated version
        with:
          python-version: "3.10"

      - name: Run scraper
        run: python scraper.py

      - name: Commit & push changes
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          git diff --quiet && echo "No changes" || git commit -m "Auto update jobs data"
          git push
