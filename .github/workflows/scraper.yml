name: Update Job Data

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"   # Fix 1: must be a string, not a boolean

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0                        # Fix 4: full history so rebase works correctly

      - name: Sync with remote (IMPORTANT)
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt       # Fix 2: actually install packages

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push safely
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add jobs.json
          git diff --cached --quiet || git commit -m "Auto update jobs data"
          git pull --rebase origin main         # Fix 3: rebase before push to handle concurrent runs
          git push origin main
